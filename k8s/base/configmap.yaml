apiVersion: v1
kind: ConfigMap
metadata:
  name: drawio-config
data:
  drawio-config.json: |
    {
      "templateFile": "/templates/templates.xml",
      "realtimeUrl": "https://drawio-dev.fairkom.net/cache",
      "pusherKey": "local-rt"
    }
  templates.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <templates>
      <template
        section="Custom"
        title="Blank Diagram"
        url="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>"
        preview=""
        libs="general;basic" />
    </templates>
  PreConfig.js: |
    // draw.io PreConfig.js — real-time collaboration shim (GDPR-compliant, no Pusher)
    (function () {
      'use strict';

      if (window.__drawioRealtimeConfig) return;

      const loc = window.location;
      const WS_BASE  = (loc.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + loc.host + '/rt';
      const HTTP_BASE = loc.protocol + '//' + loc.host + '/cache';

      window.__drawioRealtimeConfig = { enabled: true };
      console.log('[DrawIO RT] Configured. WS:', WS_BASE);

      // Capture draw.io's postMessage handlers (used as fallback when mxGraph API is not ready)
      const _drawioMsgHandlers = [];
      let _parentOrigin = null;
      const _origAEL = window.addEventListener.bind(window);
      window.addEventListener = function(type, handler, options) {
        if (type === 'message' && typeof handler === 'function') _drawioMsgHandlers.push(handler);
        return _origAEL(type, handler, options);
      };
      _origAEL('message', function(e) {
        if (!_parentOrigin && e.origin && e.origin !== loc.origin) _parentOrigin = e.origin;
      }, true);

      var _applyingRemote         = false;
      var _nameReady              = false; // true once identity is confirmed (auth'd user or guest entered name)
      var _localChangeAfterRemote = false; // set in scheduleRelay when a local change arrives during remote apply

      // User identity for cursor presence
      var _userId    = 'u-' + Math.random().toString(36).slice(2, 8);
      var _userName  = 'User';
      var _ncUserId  = null; // Nextcloud login name (for avatar URL)
      var _userColor = (function() {
        var palette = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#f39c12','#1abc9c','#e67e22','#c0392b'];
        var h = 0;
        for (var i = 0; i < _userId.length; i++) h = (h * 31 + _userId.charCodeAt(i)) & 0x7fffffff;
        return palette[h % palette.length];
      })();

      // Register move listeners NOW — before app.min.js loads — so draw.io cannot block them
      // with stopImmediatePropagation. _rtOnMove is set by initPresence once the graph is ready.
      (function() {
        function fwd(cx, cy) { if (typeof window._rtOnMove === 'function') window._rtOnMove(cx, cy); }
        document.addEventListener('mousemove',  function(e) { fwd(e.clientX, e.clientY); }, true);
        document.addEventListener('pointermove', function(e) { fwd(e.clientX, e.clientY); }, true);
        document.addEventListener('mouseleave',  function()  { if (typeof window._rtOnLeave === 'function') window._rtOnLeave(); }, true);
        document.addEventListener('pointerleave', function() { if (typeof window._rtOnLeave === 'function') window._rtOnLeave(); }, true);
      })();

      // Block pusher.com CDN (GDPR) — intercept mxscript() loader
      (function() {
        function wrap(orig) {
          return function(url, onload) {
            if (typeof url === 'string' && url.includes('pusher.com')) {
              if (typeof onload === 'function') setTimeout(onload, 0);
              return;
            }
            return orig.apply(this, arguments);
          };
        }
        if (typeof window.mxscript === 'function') {
          window.mxscript = wrap(window.mxscript);
        } else {
          let _fn;
          Object.defineProperty(window, 'mxscript', {
            get: function() { return _fn; },
            set: function(fn) { _fn = wrap(fn); },
            configurable: true, enumerable: true
          });
        }
      })();

      // WebSocket management: roomId -> { ws, channels: Set }
      const rooms = new Map();

      // Send a JSON message on the first available open WebSocket
      function sendWS(obj) {
        var ws = null;
        try {
          var rid = localStorage.getItem('drawio-rt-roomId');
          if (rid && rooms.has(rid)) ws = rooms.get(rid).ws;
        } catch(e) {}
        if (!ws || ws.readyState !== 1) {
          for (var rs of rooms.values()) {
            if (rs.ws && rs.ws.readyState === 1) { ws = rs.ws; break; }
          }
        }
        if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
      }

      function ensureWebSocket(roomId) {
        if (rooms.has(roomId)) return rooms.get(roomId).ws;

        const ws = new WebSocket(WS_BASE + '?id=' + encodeURIComponent(roomId));
        const roomState = { ws, channels: new Set() };
        rooms.set(roomId, roomState);

        ws.addEventListener('message', (event) => {
          let raw;
          try { raw = JSON.parse(event.data); } catch(e) { return; }
          if (!raw || typeof raw !== 'object') return;

          // Primary path: plain XML relay from another tab
          if (raw.type === 'xml' && raw.xml && !_applyingRemote) {
            var _g = (window.__drawioEditorUi && window.__drawioEditorUi.editor && window.__drawioEditorUi.editor.graph)
                     || (window.graph && window.graph.model && window.graph);
            if (_g && _g.model && typeof mxCodec !== 'undefined' && typeof mxUtils !== 'undefined') {
              try {
                var _doc = mxUtils.parseXml(raw.xml);
                _applyingRemote = true;
                _g.model.beginUpdate();
                try { new mxCodec(_doc).decode(_doc.documentElement, _g.model); }
                finally { _g.model.endUpdate(); }
                // After endUpdate, all model events from the decode have already fired synchronously.
                // Resetting here means _localChangeAfterRemote now tracks only subsequent user edits.
                _localChangeAfterRemote = false;
                // If no local edit arrived in the next 50 ms, clear draw.io's dirty flag so it
                // does not auto-save the remote change — Tab A (the sender) already saved it.
                setTimeout(function() {
                  if (!_localChangeAfterRemote) {
                    try {
                      var ui = window.__drawioEditorUi;
                      if (ui && ui.editor) {
                        if (typeof ui.editor.setModified === 'function') ui.editor.setModified(false);
                        ui.editor.modified = false;
                      }
                    } catch(e) {}
                  }
                  _localChangeAfterRemote = false;
                }, 50);
                setTimeout(function() { _applyingRemote = false; }, 1000);
                console.log('[DrawIO RT] Applied remote XML (' + raw.xml.length + ' chars)');
              } catch(e) {
                _applyingRemote = false;
                console.error('[DrawIO RT] Apply error:', e.message);
              }
            } else if (_parentOrigin) {
              // Fallback: postMessage injection when mxGraph API not yet available
              _applyingRemote = true;
              var fakeEvt = { type:'message', data: JSON.stringify({action:'merge', xml:raw.xml}),
                              origin:_parentOrigin, source:window.parent, isTrusted:true };
              _drawioMsgHandlers.forEach(function(h) { try { h(fakeEvt); } catch(e) {} });
              setTimeout(function() { _applyingRemote = false; }, 1000);
            }
            return;
          }

          // Cursor presence from another tab
          if (raw.type === 'cursor') {
            if (typeof window._rtUpdateCursor === 'function') window._rtUpdateCursor(raw);
            return;
          }

          // Pusher channel dispatch (draw.io may bind events here in some configurations)
          for (const channel of roomState.channels) {
            const payload = raw.msg !== undefined ? raw : { msg: raw };
            channel._buffer.push(payload);
            if (channel._buffer.length > 10) channel._buffer.shift();
            for (const evName of Object.keys(channel._bindings)) {
              channel._bindings[evName].forEach(cb => { try { cb(payload); } catch(e) {} });
            }
          }
        });

        ws.addEventListener('open',  () => console.log('[DrawIO RT] WS open:', roomId));
        ws.addEventListener('close', (e) => {
          console.warn('[DrawIO RT] WS closed:', roomId, e.code);
          rooms.delete(roomId);
          setTimeout(() => ensureWebSocket(roomId), 3000);
        });
        ws.addEventListener('error', () => console.error('[DrawIO RT] WS error:', roomId));

        return ws;
      }

      // BroadcastChannel: share roomId across same-origin tabs (best-effort, partitioned in Firefox)
      let _bc = null;
      try { _bc = new BroadcastChannel('drawio-rt'); } catch(e) {}

      let _lastShim = null, _pendingRoomId = null;

      function autoSubscribeRoom(roomId) {
        if (!roomId) return;
        if (!_lastShim) { _pendingRoomId = roomId; return; }
        const ch = 'presence-' + roomId;
        if (!_lastShim._channels[ch]) _lastShim.subscribe(ch);
      }

      if (_bc) _bc.onmessage = function(e) {
        if (e.data && e.data.type === 'roomId') autoSubscribeRoom(e.data.roomId);
      };

      // Pusher channel stub
      function PusherChannel(name) {
        this._name     = name;
        this._bindings = {};
        this._buffer   = [];
        this._roomId   = name.replace(/^presence-/, '');
        this._subscribed = false;
      }
      PusherChannel.prototype.bind = function(ev, cb) {
        if (!this._bindings[ev]) this._bindings[ev] = [];
        this._bindings[ev].push(cb);
        if (ev === 'pusher:subscription_succeeded' && this._subscribed)
          setTimeout(function() { try { cb({count:1,me:{id:'local',info:{}},members:{}}); } catch(e) {} }, 0);
        if (ev !== 'pusher:subscription_succeeded' && this._buffer.length)
          this._buffer.forEach(function(p) { try { cb(p); } catch(e) {} });
        return this;
      };
      PusherChannel.prototype.unbind = function(ev, cb) {
        if (cb && this._bindings[ev]) this._bindings[ev] = this._bindings[ev].filter(f => f !== cb);
        else delete this._bindings[ev];
        return this;
      };
      PusherChannel.prototype.trigger = function() {};

      // Pusher shim
      function PusherShim() {
        this._channels = {};
        this._connCallbacks = {};
        this.sessionID = String(Math.random() * 1e5 | 0) + '.' + String(Math.random() * 1e5 | 0);
        _lastShim = this;

        setTimeout(() => {
          let roomId = _pendingRoomId; _pendingRoomId = null;
          if (!roomId) try { roomId = localStorage.getItem('drawio-rt-roomId'); } catch(e) {}
          if (roomId) autoSubscribeRoom(roomId);
        }, 100);

        const self = this;
        this.connection = {
          state: 'connected', socket_id: this.sessionID,
          bind: function(ev, cb) {
            if (!self._connCallbacks[ev]) self._connCallbacks[ev] = [];
            self._connCallbacks[ev].push(cb);
            if (ev === 'connected')    setTimeout(() => cb({ socket_id: self.sessionID }), 0);
            if (ev === 'state_change') {
              setTimeout(() => cb({ current:'connecting', previous:'initialized' }), 0);
              setTimeout(() => cb({ current:'connected',  previous:'connecting'   }), 200);
            }
          },
          unbind: function(ev, cb) {
            if (!ev) { self._connCallbacks = {}; return; }
            if (cb && self._connCallbacks[ev])
              self._connCallbacks[ev] = self._connCallbacks[ev].filter(f => f !== cb);
            else delete self._connCallbacks[ev];
          }
        };
      }
      PusherShim.prototype.subscribe = function(channelName) {
        if (!this._channels[channelName]) this._channels[channelName] = new PusherChannel(channelName);
        const channel = this._channels[channelName];
        if (!rooms.has(channel._roomId)) ensureWebSocket(channel._roomId);
        rooms.get(channel._roomId).channels.add(channel);
        setTimeout(() => {
          channel._subscribed = true;
          (channel._bindings['pusher:subscription_succeeded'] || [])
            .forEach(cb => { try { cb({count:1,me:{id:'local',info:{}},members:{}}); } catch(e) {} });
        }, 300);
        return channel;
      };
      PusherShim.prototype.channel     = function(n) { return this._channels[n] || null; };
      PusherShim.prototype.allChannels = function()  { return Object.values(this._channels); };
      PusherShim.prototype.bind_global = function(cb) { (this._globalCbs = this._globalCbs || []).push(cb); return this; };
      PusherShim.prototype.unsubscribe = function(channelName) {
        const ch = this._channels[channelName];
        if (ch) { const rs = rooms.get(ch._roomId); if (rs) rs.channels.delete(ch); delete this._channels[channelName]; }
      };
      PusherShim.prototype.disconnect = function() {
        for (const [id, st] of rooms.entries()) { if (st.ws) st.ws.close(); rooms.delete(id); }
      };

      try {
        Object.defineProperty(window, 'Pusher', {
          get: function() { return PusherShim; }, set: function() {},
          configurable: false, enumerable: true
        });
      } catch(e) { window.Pusher = PusherShim; }

      // Redirect /cache fetch (GDPR: no pusher.com)
      const _fetch = window.fetch.bind(window);
      window.fetch = function(input, init) {
        const url = typeof input === 'string' ? input : (input instanceof Request ? input.url : String(input));
        if (url.includes('pusher.com')) return Promise.reject(new Error('Pusher CDN blocked'));
        if (/\/cache(\?|$)/.test(url)) {
          const dst = HTTP_BASE + new URL(url, loc.href).search;
          return _fetch(typeof input === 'string' ? dst : new Request(dst, input), init);
        }
        return _fetch(input, init);
      };

      // Redirect /cache XHR + extract roomId from POST body
      const _open = XMLHttpRequest.prototype.open;
      const _xhrSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.open = function(method, url) {
        const args = Array.prototype.slice.call(arguments);
        if (typeof url === 'string' && /\/cache(\?|$)/.test(url)) {
          try { args[1] = HTTP_BASE + new URL(url, loc.href).search; this._rtMethod = method; } catch(_) {}
        }
        return _open.apply(this, args);
      };
      XMLHttpRequest.prototype.send = function(body) {
        if (this._rtMethod === 'POST' && typeof body === 'string') {
          try {
            const roomId = new URLSearchParams(body).get('id');
            if (roomId) {
              try { localStorage.setItem('drawio-rt-roomId', roomId); } catch(e) {}
              autoSubscribeRoom(roomId);
              if (_bc) _bc.postMessage({ type:'roomId', roomId });
            }
          } catch(e) {}
        }
        return _xhrSend.apply(this, arguments);
      };

      // Re-search for graph after diagram loads; capture Nextcloud user name
      _origAEL('message', function(e) {
        if (e.origin === loc.origin) return; // only care about cross-origin (Nextcloud)
        try {
          const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
          if (!msg || typeof msg !== 'object') return;
          if (msg.action === 'load') {
            setTimeout(attachModelListener, 1000);
            if (msg.userId)      _ncUserId = msg.userId;
            if (msg.displayName) _userName = msg.displayName;
          }
          if (msg.action === 'configure') {
            if (msg.userId)      _ncUserId = msg.userId;
            if (msg.displayName) _userName = msg.displayName;
          }
          // Nextcloud sends user info in resp[0] — e.g. {uid:"fairkomadmin", displayName:"..."}
          if (msg.action === 'remoteInvokeResponse' && Array.isArray(msg.resp) && msg.resp[0]) {
            var r = msg.resp[0];
            if (r.uid)         { _ncUserId = r.uid; _userId = 'nc-' + r.uid; _nameReady = true; }
            if (r.displayName) _userName = r.displayName;
          }
        } catch(ex) {}
      });

      // Capture EditorUi instance via prototype patch
      function patchEditorUi() {
        const cls = window.EditorUi;
        if (!cls || !cls.prototype || cls.prototype._rtPatched) return !!window.__drawioEditorUi;
        cls.prototype._rtPatched = true;
        const _orig = cls.prototype.init || function(){};
        cls.prototype.init = function() {
          const r = _orig.apply(this, arguments);
          if (!window.__drawioEditorUi) window.__drawioEditorUi = this;
          return r;
        };
        return !!window.__drawioEditorUi;
      }

      // Attach model change listener and relay updates via WebSocket
      function attachModelListener() {
        let graph = window.__drawioEditorUi && window.__drawioEditorUi.editor && window.__drawioEditorUi.editor.graph;

        if (!graph && window.graph && window.graph.model) graph = window.graph;

        if (!graph) {
          for (const k of ['app','App','ui','editor','drawio','editorUi','diagramEditor']) {
            const c = window[k];
            if (c && c.editor && c.editor.graph && c.editor.graph.model) {
              window.__drawioEditorUi = c; graph = c.editor.graph; break;
            }
          }
        }

        if (!graph) {
          try {
            for (const k of Object.keys(window)) {
              if (graph || k.length < 3 || /^(on|webkit|moz|ms|__)/i.test(k)) continue;
              try {
                const v = window[k];
                if (v && typeof v === 'object' && !Array.isArray(v) && !(v instanceof Element) &&
                    v.editor && v.editor.graph && v.editor.graph.model &&
                    typeof v.editor.graph.model.addListener === 'function') {
                  window.__drawioEditorUi = v; graph = v.editor.graph;
                }
              } catch(e) {}
            }
          } catch(e) {}
        }

        if (!graph || !graph.model) return false;
        if (graph.model._rtListenerAttached) return true;
        graph.model._rtListenerAttached = true;

        let _relayTimer = null;
        function scheduleRelay() {
          if (_applyingRemote) { _localChangeAfterRemote = true; return; }
          clearTimeout(_relayTimer);
          _relayTimer = setTimeout(function() {
            try {
              if (typeof mxCodec === 'undefined' || typeof mxUtils === 'undefined') return;
              const xml = mxUtils.getXml(new mxCodec().encode(graph.model));
              if (!xml || xml.length < 10) return;
              // Find an open WebSocket — prefer room stored in localStorage
              let ws = null;
              try {
                const roomId = localStorage.getItem('drawio-rt-roomId');
                if (roomId && rooms.has(roomId)) ws = rooms.get(roomId).ws;
              } catch(e) {}
              if (!ws || ws.readyState !== 1) {
                for (const rs of rooms.values()) {
                  if (rs.ws && rs.ws.readyState === 1) { ws = rs.ws; break; }
                }
              }
              if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ type:'xml', xml }));
                console.log('[DrawIO RT] Sent XML (' + xml.length + ' chars)');
              }
            } catch(e) {}
          }, 300);
        }

        graph.model.addListener('change', scheduleRelay);
        graph.model.addListener('endUpdate', function(sender, evt) {
          const edit = evt && evt.getProperty && evt.getProperty('edit');
          if (edit && edit.changes && edit.changes.length > 0) scheduleRelay();
        });
        initPresence(graph);
        console.log('[DrawIO RT] Ready');
        return true;
      }

      // Cursor presence overlay: show other users' cursors on the diagram canvas
      function initPresence(graph) {
        if (graph._rtPresenceInit) return;
        graph._rtPresenceInit = true;
        console.log('[DrawIO RT] Presence init');

        // Identity check: authenticated Nextcloud users are ready immediately.
        // Anonymous / external-link users get a name prompt after 1.5 s (to let NC postMessages arrive).
        if (_ncUserId) {
          _nameReady = true;
        } else {
          var _saved = null;
          try { _saved = localStorage.getItem('drawio-rt-guestName'); } catch(e) {}
          if (_saved) {
            _userName = _saved;
            _nameReady = true;
          } else {
            setTimeout(function() {
              if (_nameReady) return; // NC identity arrived in the meantime
              var backdrop = document.createElement('div');
              backdrop.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:99999;display:flex;align-items:center;justify-content:center';
              var box = document.createElement('div');
              box.style.cssText = 'background:#fff;border-radius:10px;padding:28px 32px;box-shadow:0 8px 32px rgba(0,0,0,.3);font-family:sans-serif;min-width:280px;text-align:center';
              box.innerHTML =
                '<div style="font-size:16px;font-weight:bold;margin-bottom:12px">Enter your name</div>' +
                '<input id="_rtGuestNameInput" type="text" placeholder="display name" maxlength="40" ' +
                  'style="width:100%;box-sizing:border-box;padding:8px 10px;font-size:14px;border:1px solid #ccc;border-radius:6px;margin-bottom:14px"/>' +
                '<button id="_rtGuestNameOk" style="background:#3498db;color:#fff;border:none;border-radius:6px;padding:8px 22px;font-size:14px;cursor:pointer;width:100%">Join</button>';
              backdrop.appendChild(box);
              document.body.appendChild(backdrop);
              var inp = document.getElementById('_rtGuestNameInput');
              var btn = document.getElementById('_rtGuestNameOk');
              function confirmName() {
                var n = inp.value.trim();
                if (!n) return;
                _userName = n;
                _nameReady = true;
                try { localStorage.setItem('drawio-rt-guestName', n); } catch(e) {}
                document.body.removeChild(backdrop);
              }
              btn.addEventListener('click', confirmName);
              inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') confirmName(); });
              setTimeout(function() { inp.focus(); }, 50);
            }, 1500);
          }
        }

        // Fixed overlay on body — never clipped by graph.container's overflow:hidden.
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:2147483647';
        document.body.appendChild(overlay);

        // userId -> { el, dx, dy, curX, curY, hidden, timeout }
        var cursors = {};

        // Diagram coords → viewport px, accounting for container scroll (draw.io pans via scrollLeft/scrollTop)
        function toPx(dx, dy) {
          var v    = graph.view;
          var rect = graph.container.getBoundingClientRect();
          var sl   = graph.container.scrollLeft || 0;
          var st   = graph.container.scrollTop  || 0;
          return {
            x: rect.left + (dx + v.translate.x) * v.scale - sl,
            y: rect.top  + (dy + v.translate.y) * v.scale - st
          };
        }

        // rAF render loop: lerp each cursor toward its diagram-coordinate target every frame.
        // This replaces CSS transitions — no flicker on rapid updates, and pan/zoom/scroll
        // are handled automatically because toPx() reads the live view state each frame.
        (function renderLoop() {
          for (var uid in cursors) {
            var cur = cursors[uid];
            if (cur.hidden) continue;
            var px = toPx(cur.dx, cur.dy);
            if (cur.curX === undefined) { cur.curX = px.x; cur.curY = px.y; }
            else { cur.curX += (px.x - cur.curX) * 0.18; cur.curY += (px.y - cur.curY) * 0.18; }
            cur.el.style.transform = 'translate(' + cur.curX + 'px,' + cur.curY + 'px)';
          }
          requestAnimationFrame(renderLoop);
        })();

        window._rtUpdateCursor = function(data) {
          if (!data.userId || data.userId === _userId) return;

          if (data.x === null || data.y === null) {
            if (cursors[data.userId]) {
              var c = cursors[data.userId];
              c.hidden = true;
              c.curX = undefined; // snap to correct position on next appearance
              c.el.style.visibility = 'hidden';
              clearTimeout(c.timeout);
            }
            return;
          }

          var color = data.color || '#3498db';
          var name  = (data.userName || 'User').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          if (!cursors[data.userId]) {
            var uid64     = data.ncUserId || '';
            var avatarUrl = (uid64 && _parentOrigin) ? (_parentOrigin + '/avatar/' + encodeURIComponent(uid64) + '/64?v=0') : '';
            var el = document.createElement('div');
            el.style.cssText = 'position:absolute;left:0;top:0;pointer-events:none;will-change:transform;visibility:hidden;display:flex;align-items:flex-start';
            el.innerHTML =
              '<svg width="18" height="22" viewBox="0 0 18 22" style="flex-shrink:0;filter:drop-shadow(1px 1px 1px rgba(0,0,0,.4))">' +
                '<path d="M1 1 L1 18 L5 13 L8 21 L10 20 L7 12 L12 12 Z" fill="' + color + '" stroke="white" stroke-width="1.2"/>' +
              '</svg>' +
              '<div style="margin-left:4px;margin-top:8px;display:flex;flex-direction:column;align-items:center;gap:2px">' +
                (avatarUrl ? '<img src="' + avatarUrl + '" style="width:28px;height:28px;border-radius:50%;border:2px solid ' + color + ';display:block" onerror="this.style.display=\'none\'">' : '') +
                '<div style="background:' + color + ';color:#fff;font:bold 11px/1.5 sans-serif;padding:1px 6px;border-radius:10px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.3)">' +
                  name +
                '</div>' +
              '</div>';
            overlay.appendChild(el);
            cursors[data.userId] = { el: el, dx: 0, dy: 0, hidden: true, curX: undefined, curY: undefined, timeout: null };
            console.log('[DrawIO RT] New cursor for', data.userName || data.userId);
          }

          var cur = cursors[data.userId];
          cur.dx = data.x;
          cur.dy = data.y;
          cur.hidden = false;
          cur.el.style.visibility = '';

          clearTimeout(cur.timeout);
          cur.timeout = setTimeout(function() {
            cur.hidden = true;
            cur.curX = undefined;
            cur.el.style.visibility = 'hidden';
          }, 8000);
        };

        // Wire the early-registered capture listeners to this instance's position sender.
        // Leave is debounced 800 ms — covers brief event gaps when hovering over draw.io
        // connection points or handles, which can briefly trigger document-level leave events.
        var _cursorTimer = null;
        var _leaveTimer  = null;
        function _onMove(cx, cy) {
          if (!_nameReady) return;
          if (_leaveTimer) { clearTimeout(_leaveTimer); _leaveTimer = null; }
          if (_cursorTimer) return;
          var rect = graph.container.getBoundingClientRect();
          if (cx < rect.left || cx > rect.right || cy < rect.top || cy > rect.bottom) return;
          _cursorTimer = setTimeout(function() { _cursorTimer = null; }, 50);
          var v  = graph.view;
          var sl = graph.container.scrollLeft || 0;
          var st = graph.container.scrollTop  || 0;
          var dx = ((cx - rect.left) + sl) / v.scale - v.translate.x;
          var dy = ((cy - rect.top)  + st) / v.scale - v.translate.y;
          sendWS({ type:'cursor', userId:_userId, userName:_userName, ncUserId:_ncUserId, color:_userColor, x:dx, y:dy });
        }
        window._rtOnMove  = function(cx, cy) { _onMove(cx, cy); };
        window._rtOnLeave = function() {
          if (_leaveTimer) return;
          _leaveTimer = setTimeout(function() {
            _leaveTimer = null;
            sendWS({ type:'cursor', userId:_userId, userName:_userName, ncUserId:_ncUserId, color:_userColor, x:null, y:null });
          }, 800);
        };
      }

      (function poll() {
        patchEditorUi();
        if (!attachModelListener()) setTimeout(poll, 500);
      })();
    })();