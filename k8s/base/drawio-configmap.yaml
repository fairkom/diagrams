apiVersion: v1
kind: ConfigMap
metadata:
  name: drawio-config
data:
  drawio-config.json: |
    {
      "templateFile": "/templates/templates.xml",
      "realtimeUrl": "https://drawio-dev.fairkom.net/cache",
      "pusherKey": "local-rt"
    }
  templates.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <templates>
      <template section="Project"      url="basic/kanban.xml"                    title="Kanban Board"           libs="general"            tags="kanban;agile;project" />
      <template section="Project"      url="tables/gantt_1.xml"                  title="Gantt Chart"            libs="general"            tags="gantt;timeline;project" />
      <template section="Process"      url="basic/flowchart.xml"                 title="Flowchart"              libs="general;flowchart"  tags="flowchart;process" />
      <template section="Process"      url="basic/cross.xml"                     title="Swimlane Flowchart"     libs="general;flowchart"  tags="swimlane;cross-functional;process" />
      <template section="Process"      url="business/bpmn.xml"                   title="BPMN"                   libs="bpmn"               tags="bpmn;process;business" />
      <template section="Organization" url="basic/orgchart.xml"                  title="Org Chart"              libs="general"            tags="org;hierarchy;organization" />
      <template section="Organization" url="basic/mindmap.xml"                   title="Mind Map"               libs="general"            tags="mindmap;brainstorm;ideas" />
      <template section="Software"     url="basic/sequence.xml"                  title="Sequence Diagram"       libs="general;uml"        tags="sequence;uml;api" />
      <template section="Software"     url="basic/erd.xml"                       title="Entity Relationship"    libs="general;entity"     tags="erd;database;schema" />
      <template section="Software"     url="basic/classes.xml"                   title="UML Class Diagram"      libs="general;uml"        tags="class;uml;oop" />
      <template section="Software"     url="software/git_flow_1.xml"             title="Git Flow"               libs="general"            tags="git;version;branching" />
      <template section="Network"      url="network/cisco_1.xml"                 title="Network Diagram"        libs="cisco"              tags="network;infrastructure;cisco" />
      <template section="Business"     url="business/business_model_canvas_1.xml" title="Business Model Canvas" libs="general"            tags="canvas;business;strategy" />
    </templates>
  PreConfig.js: |
    // draw.io PreConfig.js — real-time collaboration shim (GDPR-compliant, no Pusher)
    (function () {
      'use strict';

      if (window.__drawioRealtimeConfig) return;

      const loc = window.location;
      const WS_BASE  = (loc.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + loc.host + '/rt';
      const HTTP_BASE = loc.protocol + '//' + loc.host + '/cache';

      window.__drawioRealtimeConfig = { enabled: true };
      console.log('[DrawIO RT] Configured. WS:', WS_BASE);

      // Capture draw.io's postMessage handlers (used as fallback when mxGraph API is not ready)
      const _drawioMsgHandlers = [];
      let _parentOrigin = null;
      const _origAEL = window.addEventListener.bind(window);
      window.addEventListener = function(type, handler, options) {
        if (type === 'message' && typeof handler === 'function') _drawioMsgHandlers.push(handler);
        return _origAEL(type, handler, options);
      };
      _origAEL('message', function(e) {
        if (!_parentOrigin && e.origin && e.origin !== loc.origin) _parentOrigin = e.origin;
      }, true);

      var _applyingRemote         = false;
      var _nameReady              = false; // true once identity is confirmed (auth'd user or guest entered name)
      var _localChangeAfterRemote = false; // set in scheduleRelay when a local change arrives during remote apply
      var _lastServerXml = null;  // last XML received from RT server; used to restore Tab B after draft-dismiss

      // Apply _lastServerXml to the graph — called after draft dialog is dismissed on Tab B,
      // and also from attachModelListener as a safety net if no draft dialog appeared.
      function _applyLastServerXml() {
        if (!_lastServerXml) return;
        var _g = (window.__drawioEditorUi && window.__drawioEditorUi.editor && window.__drawioEditorUi.editor.graph)
                 || (window.graph && window.graph.model && window.graph);
        if (!_g || !_g.model || typeof mxCodec === 'undefined' || typeof mxUtils === 'undefined') return;
        try {
          var _doc = mxUtils.parseXml(_lastServerXml);
          _applyingRemote = true;
          _g.model.beginUpdate();
          try { new mxCodec(_doc).decode(_doc.documentElement, _g.model); }
          finally { _g.model.endUpdate(); }
          setTimeout(function() { _applyingRemote = false; }, 1000);
          console.log('[DrawIO RT] Applied server XML (' + _lastServerXml.length + ' chars)');
        } catch(e) { _applyingRemote = false; console.error('[DrawIO RT] _applyLastServerXml error:', e.message); }
        // Re-enable the editor — draw.io may have left it disabled after the dialog
        setTimeout(function() {
          try {
            var _g2 = (window.__drawioEditorUi && window.__drawioEditorUi.editor && window.__drawioEditorUi.editor.graph)
                       || (window.graph && window.graph.model && window.graph);
            if (_g2) {
              if (typeof _g2.setEnabled === 'function') _g2.setEnabled(true);
              if (_g2.container) _g2.container.style.pointerEvents = '';
            }
            _rtRestoreEditorState();
          } catch(e) {}
        }, 150);
      }

      // User identity for cursor presence
      var _userId    = 'u-' + Math.random().toString(36).slice(2, 8);
      var _userName  = 'User';
      var _ncUserId  = null; // Nextcloud login name (for avatar URL)
      var _userColor = (function() {
        var palette = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#f39c12','#1abc9c','#e67e22','#c0392b'];
        var h = 0;
        for (var i = 0; i < _userId.length; i++) h = (h * 31 + _userId.charCodeAt(i)) & 0x7fffffff;
        return palette[h % palette.length];
      })();

      // Register move listeners NOW — before app.min.js loads — so draw.io cannot block them
      // with stopImmediatePropagation. _rtOnMove is set by initPresence once the graph is ready.
      (function() {
        function fwd(cx, cy) { if (typeof window._rtOnMove === 'function') window._rtOnMove(cx, cy); }
        document.addEventListener('mousemove',  function(e) { fwd(e.clientX, e.clientY); }, true);
        document.addEventListener('pointermove', function(e) { fwd(e.clientX, e.clientY); }, true);
        document.addEventListener('mouseleave',  function()  { if (typeof window._rtOnLeave === 'function') window._rtOnLeave(); }, true);
        document.addEventListener('pointerleave', function() { if (typeof window._rtOnLeave === 'function') window._rtOnLeave(); }, true);
      })();

      // Splash screen — replaces the default "Flowchart Maker..." browser title text with a
      // branded loading screen. Fades out once the mxGraph canvas is fully ready.
      (function() {
        // Inline SVG diagrams — no external image requests (GDPR-safe)
        var _SVG_FLOW =
          '<svg width="170" height="205" viewBox="0 0 170 205" xmlns="http://www.w3.org/2000/svg">' +
          '<defs><marker id="_rtSplA" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">' +
          '<path d="M0,0 L0,6 L7,3 Z" fill="#94a3b8"/></marker></defs>' +
          '<ellipse cx="85" cy="18" rx="42" ry="15" fill="#3b82f6"/>' +
          '<text x="85" y="23" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif">Start</text>' +
          '<line x1="85" y1="33" x2="85" y2="51" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#_rtSplA)"/>' +
          '<rect x="20" y="51" width="130" height="32" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>' +
          '<text x="85" y="72" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial,sans-serif">Process data</text>' +
          '<line x1="85" y1="83" x2="85" y2="101" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#_rtSplA)"/>' +
          '<polygon points="85,101 132,125 85,149 38,125" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>' +
          '<text x="85" y="129" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">Valid?</text>' +
          '<line x1="85" y1="149" x2="85" y2="167" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#_rtSplA)"/>' +
          '<text x="92" y="163" fill="#94a3b8" font-size="8" font-family="Arial,sans-serif">Yes</text>' +
          '<ellipse cx="85" cy="181" rx="42" ry="15" fill="#22c55e"/>' +
          '<text x="85" y="186" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif">Done</text>' +
          '<path d="M132,125 L154,125 L154,67 L150,67" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#_rtSplA)"/>' +
          '<text x="136" y="121" fill="#94a3b8" font-size="8" font-family="Arial,sans-serif">No</text>' +
          '</svg>';

        var _SVG_KANBAN =
          '<svg width="215" height="158" viewBox="0 0 215 158" xmlns="http://www.w3.org/2000/svg">' +
          '<rect x="3" y="3" width="64" height="152" rx="8" fill="#f1f5f9"/>' +
          '<rect x="75" y="3" width="64" height="152" rx="8" fill="#f1f5f9"/>' +
          '<rect x="147" y="3" width="64" height="152" rx="8" fill="#f1f5f9"/>' +
          '<rect x="3" y="3" width="64" height="28" rx="8" fill="#64748b"/>' +
          '<rect x="3" y="19" width="64" height="12" fill="#64748b"/>' +
          '<text x="35" y="22" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif">To Do</text>' +
          '<rect x="75" y="3" width="64" height="28" rx="8" fill="#3b82f6"/>' +
          '<rect x="75" y="19" width="64" height="12" fill="#3b82f6"/>' +
          '<text x="107" y="22" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">In Progress</text>' +
          '<rect x="147" y="3" width="64" height="28" rx="8" fill="#22c55e"/>' +
          '<rect x="147" y="19" width="64" height="12" fill="#22c55e"/>' +
          '<text x="179" y="22" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif">Done</text>' +
          '<rect x="8" y="36" width="54" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>' +
          '<text x="35" y="54" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">Design UI</text>' +
          '<rect x="8" y="69" width="54" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>' +
          '<text x="35" y="87" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">Write tests</text>' +
          '<rect x="8" y="102" width="54" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>' +
          '<text x="35" y="120" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">API docs</text>' +
          '<rect x="80" y="36" width="54" height="28" rx="4" fill="white" stroke="#93c5fd" stroke-width="1.5"/>' +
          '<text x="107" y="54" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">Auth module</text>' +
          '<rect x="80" y="69" width="54" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>' +
          '<text x="107" y="87" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">Deploy</text>' +
          '<rect x="152" y="36" width="54" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>' +
          '<text x="179" y="54" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">Database</text>' +
          '<rect x="152" y="69" width="54" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>' +
          '<text x="179" y="87" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">Login page</text>' +
          '<rect x="152" y="102" width="54" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>' +
          '<text x="179" y="120" text-anchor="middle" fill="#334155" font-size="8" font-family="Arial,sans-serif">User model</text>' +
          '<text x="197" y="49" fill="#22c55e" font-size="13" font-family="Arial,sans-serif">&#10003;</text>' +
          '<text x="197" y="82" fill="#22c55e" font-size="13" font-family="Arial,sans-serif">&#10003;</text>' +
          '<text x="197" y="115" fill="#22c55e" font-size="13" font-family="Arial,sans-serif">&#10003;</text>' +
          '</svg>';

        var _SVG_NET =
          '<svg width="190" height="162" viewBox="0 0 190 162" xmlns="http://www.w3.org/2000/svg">' +
          '<defs><marker id="_rtSplN" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">' +
          '<path d="M0,0 L0,6 L7,3 Z" fill="#94a3b8"/></marker></defs>' +
          '<circle cx="28" cy="26" r="22" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>' +
          '<text x="28" y="23" text-anchor="middle" fill="#334155" font-size="7" font-family="Arial,sans-serif">User</text>' +
          '<text x="28" y="34" text-anchor="middle" fill="#334155" font-size="7" font-family="Arial,sans-serif">Browser</text>' +
          '<circle cx="162" cy="26" r="22" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>' +
          '<text x="162" y="23" text-anchor="middle" fill="#334155" font-size="7" font-family="Arial,sans-serif">User</text>' +
          '<text x="162" y="34" text-anchor="middle" fill="#334155" font-size="7" font-family="Arial,sans-serif">Mobile</text>' +
          '<rect x="63" y="10" width="64" height="32" rx="7" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>' +
          '<text x="95" y="30" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">API Gateway</text>' +
          '<line x1="49" y1="22" x2="63" y2="22" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,2"/>' +
          '<line x1="141" y1="22" x2="127" y2="22" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,2"/>' +
          '<rect x="15" y="62" width="66" height="30" rx="7" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>' +
          '<text x="48" y="81" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">App Server</text>' +
          '<rect x="109" y="62" width="66" height="30" rx="7" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>' +
          '<text x="142" y="81" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">App Server</text>' +
          '<line x1="82" y1="42" x2="52" y2="62" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#_rtSplN)"/>' +
          '<line x1="108" y1="42" x2="138" y2="62" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#_rtSplN)"/>' +
          '<ellipse cx="95" cy="150" rx="35" ry="11" fill="#9333ea" stroke="#7e22ce" stroke-width="1.5"/>' +
          '<ellipse cx="95" cy="136" rx="35" ry="11" fill="#9333ea" stroke="#7e22ce" stroke-width="1.5"/>' +
          '<rect x="60" y="136" width="70" height="14" fill="#9333ea"/>' +
          '<line x1="60" y1="136" x2="60" y2="150" stroke="#7e22ce" stroke-width="1.5"/>' +
          '<line x1="130" y1="136" x2="130" y2="150" stroke="#7e22ce" stroke-width="1.5"/>' +
          '<text x="95" y="147" text-anchor="middle" fill="white" font-size="8" font-family="Arial,sans-serif">PostgreSQL</text>' +
          '<line x1="48" y1="92" x2="72" y2="130" stroke="#94a3b8" stroke-width="1.5"/>' +
          '<line x1="142" y1="92" x2="118" y2="130" stroke="#94a3b8" stroke-width="1.5"/>' +
          '<rect x="152" y="108" width="36" height="22" rx="5" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>' +
          '<text x="170" y="123" text-anchor="middle" fill="white" font-size="8" font-family="Arial,sans-serif">Redis</text>' +
          '<line x1="155" y1="92" x2="163" y2="108" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,2"/>' +
          '</svg>';

        function buildSplash() {
          if (document.getElementById('_rtSplash')) return;
          var css = document.createElement('style');
          css.id  = '_rtSplashCss';
          css.textContent =
            '#_rtSplash{position:fixed;inset:0;z-index:2147483645;' +
              'background:linear-gradient(145deg,#ffffff 0%,#eaf4fd 55%,#f0fdf4 100%);' +
              'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
              'font-family:"Segoe UI",system-ui,Arial,sans-serif;' +
              'opacity:1;transition:opacity .75s ease}' +
            '#_rtSplash._rtSplOut{opacity:0;pointer-events:none}' +
            '#_rtSplTitle{font:300 clamp(20px,3.5vw,36px)/1.2 inherit;color:#1e293b;' +
              'letter-spacing:.05em;margin:0 0 36px;' +
              'animation:_rtSplFd .9s ease-out both}' +
            '#_rtSplTitle strong{font-weight:700;color:#3b82f6}' +
            '._rtSplCards{display:flex;gap:26px;align-items:flex-start;' +
              'flex-wrap:wrap;justify-content:center;max-width:760px;padding:0 20px}' +
            '._rtSplCard{background:white;border-radius:14px;' +
              'box-shadow:0 4px 28px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);' +
              'padding:18px;opacity:0;animation:_rtSplUp .8s ease-out forwards}' +
            '._rtSplCard:nth-child(1){animation-delay:.2s}' +
            '._rtSplCard:nth-child(2){animation-delay:.4s}' +
            '._rtSplCard:nth-child(3){animation-delay:.6s}' +
            '._rtSplDots{display:flex;gap:9px;margin-top:40px;' +
              'animation:_rtSplFd .9s .9s ease-out both}' +
            '._rtSplDot{width:8px;height:8px;border-radius:50%;background:#3b82f6;' +
              'animation:_rtSplBnc 1.4s infinite ease-in-out}' +
            '._rtSplDot:nth-child(2){animation-delay:.25s}' +
            '._rtSplDot:nth-child(3){animation-delay:.5s}' +
            '@keyframes _rtSplFd{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}' +
            '@keyframes _rtSplUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}' +
            '@keyframes _rtSplBnc{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}';
          document.head.appendChild(css);

          var el = document.createElement('div');
          el.id = '_rtSplash';
          el.innerHTML =
            '<div id="_rtSplTitle">diagramming <strong>boards</strong> together</div>' +
            '<div class="_rtSplCards">' +
              '<div class="_rtSplCard">' + _SVG_FLOW   + '</div>' +
              '<div class="_rtSplCard">' + _SVG_KANBAN + '</div>' +
              '<div class="_rtSplCard">' + _SVG_NET    + '</div>' +
            '</div>' +
            '<div class="_rtSplDots">' +
              '<div class="_rtSplDot"></div>' +
              '<div class="_rtSplDot"></div>' +
              '<div class="_rtSplDot"></div>' +
            '</div>';
          document.body.appendChild(el);
        }

        window._rtHideSplash = function() {
          var el = document.getElementById('_rtSplash');
          if (!el || el._hiding) return;
          el._hiding = true;
          el.classList.add('_rtSplOut');
          setTimeout(function() {
            if (el.parentNode) el.parentNode.removeChild(el);
            var css = document.getElementById('_rtSplashCss');
            if (css && css.parentNode) css.parentNode.removeChild(css);
          }, 800);
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', buildSplash);
        } else {
          buildSplash();
        }
        // Safety net: hide after 12 s even if draw.io init fails
        setTimeout(function() { if (typeof window._rtHideSplash === 'function') window._rtHideSplash(); }, 12000);
      })();

      // Replace draw.io's verbose "Unsaved changes. Click here to save." status bar with a
      // small disc so the UI stays clean. draw.io sets geStatusAlert independently of
      // setStatus (via the editor's dirty flag), so a CSS rule is the reliable fix.
      (function() {
        function _injectStatusCss() {
          if (document.getElementById('_rtStatusCss')) return;
          var s = document.createElement('style');
          s.id = '_rtStatusCss';
          s.textContent =
            'a.geStatus div.geStatusAlert{' +
            'font-size:0!important;min-width:20px!important;padding:0 2px!important;' +
            'margin:0 2px!important;background:none!important;border:none!important;' +
            'border-radius:0!important;display:inline-flex!important;' +
            'align-items:center!important;justify-content:center!important;' +
            'vertical-align:middle!important;cursor:pointer!important}' +
            'a.geStatus div.geStatusAlert::before{' +
            'content:"💾"!important;font-size:16px!important;line-height:1!important}';
          (document.head || document.documentElement).appendChild(s);
        }
        if (document.head) { _injectStatusCss(); }
        else { document.addEventListener('DOMContentLoaded', _injectStatusCss); }
      })();

      // Block pusher.com CDN (GDPR) — intercept mxscript() loader
      (function() {
        function wrap(orig) {
          return function(url, onload) {
            if (typeof url === 'string' && url.includes('pusher.com')) {
              if (typeof onload === 'function') setTimeout(onload, 0);
              return;
            }
            return orig.apply(this, arguments);
          };
        }
        if (typeof window.mxscript === 'function') {
          window.mxscript = wrap(window.mxscript);
        } else {
          let _fn;
          Object.defineProperty(window, 'mxscript', {
            get: function() { return _fn; },
            set: function(fn) { _fn = wrap(fn); },
            configurable: true, enumerable: true
          });
        }
      })();

      // WebSocket management: roomId -> { ws, channels: Set }
      const rooms = new Map();

      // Send a JSON message on the first available open WebSocket
      function sendWS(obj) {
        var ws = null;
        try {
          var rid = sessionStorage.getItem('drawio-rt-roomId') || localStorage.getItem('drawio-rt-roomId');
          if (rid && rooms.has(rid)) ws = rooms.get(rid).ws;
        } catch(e) {}
        if (!ws || ws.readyState !== 1) {
          for (var rs of rooms.values()) {
            if (rs.ws && rs.ws.readyState === 1) { ws = rs.ws; break; }
          }
        }
        if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
      }

      function ensureWebSocket(roomId) {
        if (rooms.has(roomId)) return rooms.get(roomId).ws;

        const ws = new WebSocket(WS_BASE + '?id=' + encodeURIComponent(roomId));
        const roomState = { ws, channels: new Set() };
        rooms.set(roomId, roomState);

        ws.addEventListener('message', (event) => {
          let raw;
          try { raw = JSON.parse(event.data); } catch(e) { return; }
          if (!raw || typeof raw !== 'object') return;

