apiVersion: apps/v1
kind: Deployment
metadata:
  name: drawio
  labels:
    app: drawio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drawio
  template:
    metadata:
      labels:
        app: drawio
    spec:
      containers:
        - name: drawio
          image: jgraph/drawio:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DRAWIO_CONFIG
              value: /config/drawio-config.json
            - name: DRAWIO_SELF_CONTAINED
              value: "1"
            # PRE_CONFIG_JS_URL is no longer needed, but we keep it harmless
            - name: PRE_CONFIG_JS_URL
              value: "https://drawio-dev.fairkom.net/js/PreConfig.js"
          command:
            - sh
            - -c
            - |
              CATALINA_HOME=/usr/local/tomcat
              WEBAPP_DIR=$CATALINA_HOME/webapps/draw

              echo "=== Step 1: Run original entrypoint without starting Tomcat ==="
              # Save original catalina.sh
              cp $CATALINA_HOME/bin/catalina.sh $CATALINA_HOME/bin/catalina.sh.orig

              # Replace with no‑op
              echo '#!/bin/sh' > $CATALINA_HOME/bin/catalina.sh
              echo 'echo "catalina intercepted"' >> $CATALINA_HOME/bin/catalina.sh
              echo 'exit 0' >> $CATALINA_HOME/bin/catalina.sh
              chmod +x $CATALINA_HOME/bin/catalina.sh

              # Run entrypoint – it writes PreConfig.js (original) then calls our no‑op
              /usr/local/bin/docker-entrypoint.sh catalina.sh run || true

              # Restore real catalina.sh
              cp $CATALINA_HOME/bin/catalina.sh.orig $CATALINA_HOME/bin/catalina.sh

              echo "=== Step 2: Overwrite PreConfig.js with our realtime shim ==="
              cp /config/PreConfig.js $WEBAPP_DIR/js/PreConfig.js

              echo "=== Step 3: Inject script tag into index.html ==="
              # Ensure index.html exists
              if [ -f $WEBAPP_DIR/index.html ]; then
                # Check if already injected
                if ! grep -q 'PreConfig.js' $WEBAPP_DIR/index.html; then
                  # Insert before </head>
                  sed -i 's|</head>|<script src="js/PreConfig.js"></script>\n</head>|' $WEBAPP_DIR/index.html
                  echo "✅ Injected PreConfig.js into index.html"
                else
                  echo "✅ PreConfig.js already referenced in index.html"
                fi
              else
                echo "⚠️  index.html not found at $WEBAPP_DIR/index.html"
              fi

              echo "=== Step 4: Start Tomcat ==="
              exec $CATALINA_HOME/bin/catalina.sh run
          volumeMounts:
            - name: drawio-config-volume
              mountPath: /config
              readOnly: true
            - name: drawio-templates-volume
              mountPath: /templates
              readOnly: true
            - name: drawio-config
              mountPath: /usr/share/webapps/drawio/js/PreConfig.js
              subPath: PreConfig.js
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
      volumes:
        - name: drawio-config-volume
          configMap:
            name: drawio-config
            items:
              - key: drawio-config.json
                path: drawio-config.json
              - key: PreConfig.js
                path: PreConfig.js
        - name: drawio-templates-volume
          configMap:
            name: drawio-config
            items:
              - key: templates.xml
                path: templates.xml
        - name: drawio-config
          configMap:
            name: drawio-config