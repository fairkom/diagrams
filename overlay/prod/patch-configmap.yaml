apiVersion: v1
kind: ConfigMap
metadata:
  name: drawio-config
data:
  # Production templates
  templates.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <templates>
      <template
        section="General"
        title="Flowchart"
        url="https://raw.githubusercontent.com/jgraph/drawio-libs/master/libs/flowchart.xml"
        preview=""
        libs="general;flowchart" />
    </templates>
  realtime-init.html: |
    <!-- Real-time Collaboration Support for Production -->
    <script>
      (function() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        const realtimeServerUrl = protocol + '//' + host + port + '/rt';
        
        window.__drawioRealtimeConfig = {
          enabled: true,
          serverUrl: realtimeServerUrl,
          collabEnabled: true
        };
        
        console.log('[DrawIO-RT] Real-time server configured at:', realtimeServerUrl);
      })();
    </script>
