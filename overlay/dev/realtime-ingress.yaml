apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drawio-realtime
spec:
  ingressClassName: nginx
  rules:
    - host: drawio-dev.fairkom.net
      http:
        paths:
          - path: /realtime
            pathType: Prefix
            backend:
              service:
                name: drawio-realtime
                port:
                  number: 8081
