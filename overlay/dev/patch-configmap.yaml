apiVersion: v1
kind: ConfigMap
metadata:
  name: drawio-config
data:
  templates.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <templates>
      <template
        section="Dev Environment"
        title="Development Stub"
        url="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>"
        preview=""
        libs="general" />
      <template
        section="Dev Environment"
        subsection="Testing"
        title="Mock AWS"
        url="https://raw.githubusercontent.com/jgraph/drawio-libs/master/libs/mock.xml"
        preview=""
        libs="general;mock" />
    </templates>
  custom.css: |
    /* Hide default loading message */
    #loading-message, .loading-message {
      display: none !important;
    }
    /* Custom loading styles */
    .custom-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }
    .custom-loading .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  loading.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>Loading draw.io...</title>
      <style>
        body {
          margin: 0;
          padding: 0;
          background: #f5f5f5;
          font-family: Arial, sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
        .loading-container {
          text-align: center;
        }
        .spinner {
          border: 4px solid #f3f3f3;
          border-top: 4px solid #3498db;
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
          margin: 0 auto 20px;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .loading-text {
          color: #666;
          font-size: 16px;
        }
      </style>
    </head>
    <body>
      <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading draw.io...</div>
      </div>
    </body>
    </html>
  realtime-init.html: |
    <!-- Real-time Collaboration Support for Local Deployment - v20260504 -->
    <script>
      (function() {
        // Only configure if not already configured
        if (window.__drawioRealtimeConfig) {
          console.log('[DrawIO-RT] Real-time already configured, skipping');
          return;
        }
        
        try {
          // Configure real-time server endpoint
          const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const httpProtocol = window.location.protocol;
          const host = window.location.hostname;
          const port = window.location.port ? ':' + window.location.port : '';
          const realtimeServerUrl = protocol + '//' + host + port + '/rt';
          const httpServerUrl = httpProtocol + '//' + host + port;
          
          // Store configuration for draw.io to use
          window.__drawioRealtimeConfig = {
            enabled: true,
            serverUrl: realtimeServerUrl,
            httpServerUrl: httpServerUrl,
            collabEnabled: true,
            realtimeEnabled: true,
            syncInterval: 100,
            broadcastUpdates: true,
            immediateSync: true
          };
          
          // Provide Pusher shim to redirect to our real-time server
          if (window.__drawioRealtimeConfig.blockExternalPusher !== false) {
            console.log('[DrawIO-RT] Setting up Pusher shim to use local real-time server');
            
            // Create minimal Pusher shim
            window.Pusher = class {
              constructor(appKey, options) {
                console.log('[DrawIO-RT] Pusher initialization intercepted');
                return {
                  connect: () => {
                    console.log('[DrawIO-RT] Pusher connect redirected to local WebSocket');
                  },
                  subscribe: (channel) => {
                    console.log('[DrawIO-RT] Pusher subscribe redirected:', channel);
                    return {
                      bind: (event, callback) => {
                        console.log('[DrawIO-RT] Pusher event binding redirected:', event);
                      }
                    };
                  },
                  connection: {
                    bind: (event, callback) => {
                      if (event === 'connected') {
                        console.log('[DrawIO-RT] Pusher connected event triggered');
                        setTimeout(() => callback({}), 100);
                      }
                    }
                  }
                };
              }
            };
            
            console.log('[DrawIO-RT] Pusher shim installed - external Pusher blocked');
          }
          
          console.log('[DrawIO-RT] Real-time server configured at:', realtimeServerUrl);
          console.log('[DrawIO-RT] HTTP server configured at:', httpServerUrl);
          console.log('[DrawIO-RT] Protocol:', protocol, 'Host:', host, 'Port:', port);
        } catch (error) {
          console.error('[DrawIO-RT] Configuration error:', error);
        }
      })();
    </script>